<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EPAL Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:'Inter';
background:linear-gradient(135deg,#0b0f14,#0f1c2b);
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:rgba(20,25,35,0.6);
backdrop-filter:blur(20px);
padding:20px;
}
.sidebar h2{color:#00e0ff}
.sidebar a{
display:block;margin:12px 0;
color:#aaa;cursor:pointer;
transition:0.3s;
}
.sidebar a:hover,.active{color:white}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
padding:15px 20px;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
}

/* CONTENT */
.content{
padding:20px;
overflow:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
backdrop-filter:blur(10px);
transition:0.3s;
cursor:pointer;
}
.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* KPI */
.kpi{
font-size:28px;
font-weight:600;
}

/* STATUS */
.status{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}
.ok{background:#00ffcc;color:#000}
.warn{background:#ffcc00;color:#000}

/* MODAL */
.modal{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:16px;
display:none;
width:320px;
}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(135deg,#007aff,#00e0ff);
padding:15px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 20px rgba(0,122,255,0.5);
}
.chat{
position:fixed;
bottom:80px;
right:20px;
width:320px;
background:#111;
border-radius:16px;
display:none;
}
.chat-body{height:220px;overflow:auto;padding:10px}
.msg{margin:6px;padding:10px;border-radius:12px}
.user{background:#007aff}
.bot{background:#222;color:#00e0ff}

/* MAP */
#map{height:350px;border-radius:12px}
</style>
</head>

<body>

<div class="sidebar">
<h2>EPAL</h2>
<a onclick="show('dashboard',this)">Dashboard</a>
<a onclick="show('clientes',this)">Clientes</a>
<a onclick="show('mapa',this)">Mapa</a>
<a onclick="show('reclamacoes',this)">Reclamações</a>
<a onclick="show('pagamentos',this)">Pagamentos</a>
<a onclick="show('analytics',this)">Analytics</a>
</div>

<div class="main">

<div class="topbar">
<div>Digital Platform</div>
<div>Online ●</div>
</div>

<div class="content" id="content"></div>

</div>

<div class="modal" id="modal"></div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat" id="chat">
<div class="chat-body" id="chatBody"></div>
<input id="chatInput" placeholder="Pergunte algo..." style="width:70%">
<button onclick="chat()">></button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let clientes=[
{nome:"João Manuel",bairro:"Talatona",consumo:"120L",status:"ok"},
{nome:"Empresa ABC",bairro:"Viana",consumo:"800L",status:"warn"}
];

let reclamacoes=[];

/* NAV */
function show(m,el){
document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
if(el) el.classList.add('active');

/* DASHBOARD */
if(m==="dashboard"){
content.innerHTML=`
<h1>Dashboard</h1>
<div class="grid">
<div class="card"><div class="kpi">120M Kz</div>Receita</div>
<div class="card"><div class="kpi">35M Kz</div>Perdas</div>
<div class="card"><div class="kpi">${clientes.length}</div>Clientes</div>
</div>`;
}

/* CLIENTES */
if(m==="clientes"){
let html="<h1>Clientes</h1><div class='grid'>";
clientes.forEach(c=>{
html+=`
<div class="card" onclick="perfil('${c.nome}','${c.bairro}','${c.consumo}')">
<h3>${c.nome}</h3>
<p>${c.bairro}</p>
<span class="status ${c.status}">${c.status}</span>
</div>`;
});
html+="</div>";
content.innerHTML=html;
}

/* MAPA */
if(m==="mapa"){
content.innerHTML=`<h1>Mapa Inteligente</h1><div id="map"></div>`;
setTimeout(()=>{
let map=L.map('map').setView([-8.83,13.23],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
clientes.forEach(c=>{
L.marker([-8.9+Math.random()/10,13.2+Math.random()/10])
.addTo(map).bindPopup(c.nome);
});
},100);
}

/* RECLAMAÇÕES */
if(m==="reclamacoes"){
content.innerHTML=`
<h1>Reclamações</h1>
<div class="card">
<input id="nome" placeholder="Nome">
<input id="bairro" placeholder="Bairro">
<textarea id="prob"></textarea>
<button onclick="addRec()">Enviar</button>
</div>`;
}

/* PAGAMENTO */
if(m==="pagamentos"){
content.innerHTML=`
<h1>Pagamento</h1>
<div class="card" onclick="alert('Pagamento efetuado')">
💳 Pagar Conta
</div>`;
}

/* ANALYTICS */
if(m==="analytics"){
content.innerHTML=`
<h1>Analytics</h1>
<div class="grid">
<div class="card">Eficiência 78%</div>
<div class="card">Consumo Médio 120L</div>
</div>`;
}
}

/* PERFIL */
function perfil(n,b,c){
modal.innerHTML=`<h2>${n}</h2><p>${b}</p><p>${c}</p>
<button onclick="modal.style.display='none'">Fechar</button>`;
modal.style.display="block";
}

/* RECLAMAÇÃO */
function addRec(){
alert("Reclamação enviada com sucesso");
}

/* CHAT */
function toggleChat(){
chat.style.display=chat.style.display==="none"?"block":"none";
}

function chat(){
let txt=chatInput.value;
addMsg(txt,'user');

setTimeout(()=>{
addMsg("Estamos a verificar sua solicitação.","bot");
},600);

chatInput.value="";
}

function addMsg(t,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
chatBody.appendChild(d);
chatBody.scrollTop=chatBody.scrollHeight;
}

show('dashboard');

</script>

</body>
  </html>
