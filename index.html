<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EPAL Digital Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0f14;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(10,15,20,0.95);
  backdrop-filter: blur(15px);
  height:100vh;
  padding:20px;
  position:fixed;
}
.sidebar h2{
  color:#00ffcc;
}
.sidebar a{
  display:block;
  margin:15px 0;
  color:#aaa;
  text-decoration:none;
  transition:0.3s;
}
.sidebar a:hover{
  color:#00ffcc;
  transform:translateX(5px);
}

/* MAIN */
.main{
  margin-left:260px;
  width:100%;
}

/* TOPBAR */
.topbar{
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:5;
}

/* HERO */
.hero{
  height:60vh;
  background:linear-gradient(rgba(0,40,80,0.5), rgba(0,40,80,0.6)),
  url('https://images.unsplash.com/photo-1581091215363-0b593b9a1e9f?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  display:flex;
  align-items:center;
  padding:40px;
}
.hero h1{
  font-size:42px;
}

/* SECTION */
.section{
  padding:60px 30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(20,30,45,0.9);
  border-radius:16px;
  padding:20px;
  backdrop-filter: blur(10px);
  transition:0.4s;
}
.card:hover{
  transform:translateY(-10px) scale(1.03);
}

/* AVATAR */
.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
}

/* MAP */
#map{
  height:400px;
  border-radius:16px;
}

/* CHATBOT */
.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

.chat-header{
  background:#007aff;
  padding:10px;
  text-align:center;
}

.chat-body{
  height:250px;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:8px 0;
  padding:10px;
  border-radius:14px;
  max-width:70%;
}
.user{background:#007aff;margin-left:auto;}
.bot{background:#222;color:#00ffcc;}

.chat-input{
  display:flex;
}
.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  background:#111;
  color:white;
}
.chat-input button{
  background:#007aff;
  border:none;
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>EPAL</h2>
  <a href="#funcionarios">Funcionários</a>
  <a href="#clientes">Clientes</a>
  <a href="#mapa">Mapa</a>
  <a href="#financeiro">Financeiro</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div>Infraestrutura Digital</div>
  <div>Powered by Magestade Pura Digital</div>
</div>

<div class="hero">
  <h1>Gestão Inteligente de Água em Luanda</h1>
</div>

<!-- FUNCIONÁRIOS -->
<div class="section" id="funcionarios">
<h2>Funcionários</h2>
<div class="grid" id="funcionariosGrid"></div>
</div>

<!-- CLIENTES -->
<div class="section" id="clientes">
<h2>Clientes</h2>
<div class="grid" id="clientesGrid"></div>
</div>

<!-- MAPA REAL -->
<div class="section" id="mapa">
<h2>Mapa de Abastecimento</h2>
<div id="map"></div>
</div>

</div>

<!-- CHATBOT -->
<div class="chatbot">
<div class="chat-header">Assistente EPAL</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input">
<input id="input">
<button onclick="send()">Enviar</button>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// FUNCIONÁRIOS
const funcionarios=[
{nome:"Edgar Songanga",cargo:"CEO"},
{nome:"Jeniusa Prata",cargo:"Diretora"},
{nome:"Miguel Santos",cargo:"Engenheiro"}
];

const fGrid=document.getElementById("funcionariosGrid");
funcionarios.forEach(f=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<img class="avatar" src="https://i.pravatar.cc/60">
<h3>${f.nome}</h3>
<p>${f.cargo}</p>`;
fGrid.appendChild(div);
});

// CLIENTES
const clientes=[
{nome:"João Manuel",bairro:"Talatona"},
{nome:"Maria Silva",bairro:"Kilamba"},
{nome:"Empresa ABC",bairro:"Viana"}
];

const cGrid=document.getElementById("clientesGrid");
clientes.forEach(c=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<img class="avatar" src="https://i.pravatar.cc/60">
<h3>${c.nome}</h3>
<p>${c.bairro}</p>`;
cGrid.appendChild(div);
});

// MAPA REAL
const map=L.map('map').setView([-8.8383,13.2344],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// PINS REAIS
[
{nome:"Talatona",coords:[-8.919,13.180]},
{nome:"Viana",coords:[-8.890,13.370]},
{nome:"Kilamba",coords:[-8.950,13.300]}
].forEach(p=>{
L.marker(p.coords).addTo(map)
.bindPopup(`Zona: ${p.nome}<br>Abastecimento ativo`);
});

// CHAT
let chat=[];
function send(){
let input=document.getElementById("input");
if(!input.value) return;

chat.push({type:"user",text:input.value});
chat.push({type:"bot",text:"Estamos a analisar sua solicitação"});

render();
input.value="";
}

function render(){
let body=document.getElementById("chatBody");
body.innerHTML="";
chat.forEach(m=>{
let d=document.createElement("div");
d.className="msg "+m.type;
d.innerText=m.text;
body.appendChild(d);
});
body.scrollTop=body.scrollHeight;
}
</script>

</body>
</html>
