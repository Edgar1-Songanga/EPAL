<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPAL Digital Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
--bg:#0b0f14;
--card:#111827;
--text:#fff;
--accent:#00c2ff;
}
.light{
--bg:#f5f7fb;
--card:#fff;
--text:#111;
}
body{
margin:0;
font-family:'Inter';
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:var(--card);
padding:20px;
display:flex;
flex-direction:column;
}
.sidebar h2{color:var(--accent)}
.sidebar a{
margin:10px 0;
cursor:pointer;
opacity:0.7;
}
.sidebar a:hover{opacity:1}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
}
.controls button{
margin-left:10px;
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CONTENT */
.content{padding:20px;overflow:auto}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:var(--card);
padding:20px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
}
.card:hover{transform:translateY(-5px)}

/* MODAL */
.modal{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:var(--card);
padding:20px;
border-radius:12px;
display:none;
width:300px;
z-index:1000;
}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--accent);
padding:15px;
border-radius:50%;
cursor:pointer;
}
.chat{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:var(--card);
display:none;
border-radius:12px;
padding:10px;
}
.msg{margin:5px;padding:8px;border-radius:10px}
.user{background:var(--accent)}
.bot{background:#333}

/* MAP */
#map{height:400px;border-radius:12px}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>EPAL</h2>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('clientes')">Clientes</a>
<a onclick="show('mapa')">Mapa</a>
<a onclick="show('reclamacoes')">Reclamações</a>
<a onclick="show('pagamentos')">Pagamentos</a>
</div>

<div class="main">

<div class="topbar">
<div id="title">Dashboard</div>

<div class="controls">
<button onclick="toggleTheme()">🌗</button>
<button onclick="toggleLang()">PT/EN</button>
</div>
</div>

<div class="content" id="content"></div>

</div>

<div class="modal" id="modal"></div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat" id="chat">
<div id="chatBody"></div>
<input id="chatInput" placeholder="Mensagem">
<button onclick="send()">Enviar</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let lang="pt";

/* TEXT */
const t={
pt:{
dashboard:"Dashboard",
clientes:"Clientes",
mapa:"Mapa",
reclamacoes:"Reclamações",
pagamentos:"Pagamentos"
},
en:{
dashboard:"Dashboard",
clientes:"Customers",
mapa:"Map",
reclamacoes:"Complaints",
pagamentos:"Payments"
}
};

/* NAV */
function show(m){

title.innerText=t[lang][m];

if(m==="dashboard"){
content.innerHTML=`
<div class="grid">
<div class="card">Receita: 120M Kz</div>
<div class="card">Perdas: 35M Kz</div>
<div class="card">Eficiência: 65%</div>
</div>
<br>
<div class="card">Insight: Perdas aumentaram em Viana (+12%)</div>
`;
}

if(m==="clientes"){
content.innerHTML=`
<div class="grid">
<div class="card" onclick="perfil('João Manuel')">João Manuel</div>
<div class="card" onclick="perfil('Empresa ABC')">Empresa ABC</div>
</div>
`;
}

if(m==="mapa"){
content.innerHTML=`<div id="map"></div>`;
setTimeout(()=>{
let map = L.map('map').setView([-8.8383,13.2344], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([-8.9,13.2]).addTo(map).bindPopup("Talatona");
L.marker([-8.85,13.3]).addTo(map).bindPopup("Viana");
},100);
}

if(m==="reclamacoes"){
content.innerHTML=`
<input id="nome" placeholder="Nome">
<textarea id="msg" placeholder="Problema"></textarea>
<button onclick="enviar()">Enviar</button>
<div id="lista"></div>
`;
}

if(m==="pagamentos"){
content.innerHTML=`
<div class="card">
<p>Simular Pagamento</p>
<input placeholder="Valor">
<button onclick="alert('Pagamento efectuado')">Pagar</button>
</div>
`;
}
}

/* PROFILE */
function perfil(n){
modal.innerHTML=`<h2>${n}</h2><p>Status: Ativo</p>`;
modal.style.display="block";
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* LANG */
function toggleLang(){
lang=lang==="pt"?"en":"pt";
show("dashboard");
}

/* RECLAMAÇÃO */
function enviar(){
let n=document.getElementById("nome").value;
let m=document.getElementById("msg").value;
let div=document.createElement("div");
div.innerText=n+": "+m;
lista.appendChild(div);
}

/* CHAT */
function toggleChat(){
chat.style.display=chat.style.display==="none"?"block":"none";
}
function send(){
let v=chatInput.value;
add(v,'user');
setTimeout(()=>add("Estamos a analisar...",'bot'),600);
chatInput.value="";
}
function add(t,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
chatBody.appendChild(d);
}

show("dashboard");

</script>

</body>
</html>
