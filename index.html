<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EPAL Digital Experience 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0f14;
  color:white;
  overflow:hidden;
}

/* LANDING */
.landing{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://images.unsplash.com/photo-1581091215363-0b593b9a1e9f?auto=format&fit=crop&w=1600&q=80') center/cover;
  z-index:10;
  flex-direction:column;
}
.landing h1{
  font-size:48px;
  backdrop-filter: blur(10px);
}
.landing button{
  padding:15px 30px;
  margin-top:20px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
}

/* LAYOUT */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(10,15,20,0.95);
  backdrop-filter: blur(20px);
  padding:20px;
}
.sidebar a{
  display:block;
  margin:12px 0;
  color:#aaa;
  cursor:pointer;
}
.sidebar a:hover{color:#00ffcc}

/* MAIN */
.main{
  flex:1;
  overflow:auto;
  padding:20px;
}

/* CARDS */
.card{
  background:rgba(20,30,45,0.8);
  padding:20px;
  border-radius:16px;
  margin:10px;
  cursor:pointer;
  transition:0.4s;
}
.card:hover{
  transform:scale(1.05) rotateX(3deg);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

/* MODALS */
.modal{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  display:none;
}

/* MAP */
#map{height:400px}

/* CHAT */
.chat{
  position:fixed;
  bottom:10px;
  right:10px;
  width:300px;
  background:#111;
  border-radius:16px;
}
.chat-body{height:200px;overflow:auto;padding:10px;}
.msg{margin:5px;padding:8px;border-radius:10px;}
.user{background:#007aff}
.bot{background:#222;color:#00ffcc}
</style>
</head>

<body>

<div class="landing" id="landing">
<h1>EPAL DIGITAL EXPERIENCE</h1>
<button onclick="start()">Entrar</button>
</div>

<div class="app" id="app" style="display:none">

<div class="sidebar">
<h2>EPAL</h2>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('clientes')">Clientes</a>
<a onclick="show('funcionarios')">Funcionários</a>
<a onclick="show('mapa')">Mapa</a>
<a onclick="show('pagamentos')">Pagamentos</a>
<a onclick="show('reclamacoes')">Reclamações</a>
<a onclick="show('infra')">Infraestrutura</a>
</div>

<div class="main" id="content"></div>

</div>

<div class="chat">
<div class="chat-body" id="chatBody"></div>
<input id="chatInput" placeholder="Fale..." style="width:70%">
<button onclick="chat()">></button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function start(){
document.getElementById("landing").style.display="none";
document.getElementById("app").style.display="flex";
show('dashboard');
}

function show(module){
let c=document.getElementById("content");

if(module==="dashboard"){
c.innerHTML=`<h1>Dashboard</h1><div class="grid">
<div class="card">Receita: 120M Kz</div>
<div class="card">Perdas: 35M Kz</div>
</div>`;
}

if(module==="clientes"){
c.innerHTML=`<h1>Clientes</h1><div class="grid">
<div class="card" onclick="profile('João')">João Manuel</div>
<div class="card" onclick="profile('Empresa ABC')">Empresa ABC</div>
</div>`;
}

if(module==="funcionarios"){
c.innerHTML=`<h1>Funcionários</h1><div class="grid">
<div class="card" onclick="profile('CEO')">CEO</div>
</div>`;
}

if(module==="mapa"){
c.innerHTML=`<h1>Mapa</h1><div id="map"></div>`;
setTimeout(()=>{
let map=L.map('map').setView([-8.83,13.23],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([-8.9,13.2]).addTo(map).bindPopup("Talatona");
},100);
}

if(module==="pagamentos"){
c.innerHTML=`<h1>Pagamento</h1>
<div class="card" onclick="alert('Pagamento simulado com sucesso')">Pagar Conta</div>`;
}

if(module==="reclamacoes"){
c.innerHTML=`<h1>Reclamação</h1>
<div class="card" onclick="alert('Reclamação enviada')">Reportar Problema</div>`;
}

if(module==="infra"){
c.innerHTML=`<h1>Infraestrutura</h1>
<div class="grid">
<div class="card">ETA Kifangondo</div>
<div class="card">Rede de Distribuição</div>
</div>`;
}
}

function profile(name){
alert("Abrir perfil: "+name);
}

/* CHAT */
let chatData=[
"Olá, como posso ajudar?",
"Estamos a verificar sua área",
"Sua reclamação foi registada"
];

function chat(){
let input=document.getElementById("chatInput");
let body=document.getElementById("chatBody");

let u=document.createElement("div");
u.className="msg user";
u.innerText=input.value;
body.appendChild(u);

let b=document.createElement("div");
b.className="msg bot";
b.innerText=chatData[Math.floor(Math.random()*chatData.length)];
body.appendChild(b);

input.value="";
body.scrollTop=body.scrollHeight;
}

</script>

</body>
</html>
